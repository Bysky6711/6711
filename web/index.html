<!DOCTYPE html>
<html lang="pl">
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Mafia — mobilna aplikacja do prowadzenia gry.">
  <meta name="theme-color" content="#050101">
  <meta name="color-scheme" content="dark">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Mafia">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="manifest" href="manifest.json">
  <title>Mafia</title>
  <style>
    html, body { margin:0; width:100%; height:100%; background:#050101; overflow:hidden; }
    body { touch-action: manipulation; }
    #splash { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; background:radial-gradient(circle at 50% 10%, #3a0505, #050101 70%); color:#fff; font-family:system-ui,-apple-system,Segoe UI,sans-serif; letter-spacing:.14em; font-weight:800; }
  </style>
</head>
<body>
  <div id="splash">MAFIA</div>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var splash = document.getElementById('splash');
      if (splash) splash.remove();
    });
  </script>
  <script>
    {{flutter_js}}
    {{flutter_build_config}}

    // Load CanvasKit from THIS app (self-hosted) instead of Google's CDN
    // (gstatic.com). Fixes "Failed to fetch ... canvaskit.js" on networks that
    // block the CDN, and lets the app run fully offline. "canvaskit/" resolves
    // against <base href>, where `flutter build`/`flutter run` bundle CanvasKit.
    _flutter.loader.load({
      config: {
        canvasKitBaseUrl: "canvaskit/"
      }
    });
  </script>
</body>
</html>
