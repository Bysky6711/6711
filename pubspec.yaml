name: mafia
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^8.1.0

  # Online multiplayer (realtime) — see SETUP_ONLINE.md.
  # If version resolution fails on your Flutter/Dart, run:
  #   flutter pub add firebase_core cloud_firestore
  firebase_core: ^4.12.1
  cloud_firestore: ^6.7.1

  # Stickers: pick a photo from the gallery + compress to a small base64 JPG
  # stored inline in the Firestore message (no Firebase Storage / Blaze needed).
  image_picker: ^1.1.2
  image: ^4.2.0

  # Persist the current room so a browser refresh / disconnect can reconnect.
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0


flutter:
  uses-material-design: true

  assets:
    - assets/images/backgrounds/
    - assets/images/card/

  fonts:
    - family: Bernier
      fonts:
        - asset: assets/fonts/bernier_regular.ttf

    - family: BernierShade
      fonts:
        - asset: assets/fonts/bernier_shade.ttf

    - family: BernierDistressed
      fonts:
        - asset: assets/fonts/bernier_distressed.ttf

